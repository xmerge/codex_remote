<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0f17" />
    <title>Codex Remote Web MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="authGate" class="auth-gate is-hidden">
      <div class="auth-card">
        <div class="auth-copy">
          <span class="eyebrow">Secure Access</span>
          <h2>输入访问密钥</h2>
          <p>会话数据和事件流在服务端受保护，只有通过鉴权后才会建立连接。</p>
        </div>
        <form id="authForm" class="auth-form">
          <label>
            <span>访问密钥</span>
            <input id="authKeyInput" type="password" autocomplete="current-password" placeholder="请输入访问密钥" />
          </label>
          <div id="authMessage" class="status-banner muted">请输入密钥后继续。</div>
          <button id="authSubmitBtn" type="submit" class="primary">解锁访问</button>
        </form>
      </div>
    </div>

    <div class="app-shell">
      <!-- 移动端遮罩层 -->
      <div id="sidebarOverlay" class="sidebar-overlay"></div>

      <!-- 移动端顶部导航栏 -->
      <header class="mobile-header">
        <button id="menuToggle" class="menu-toggle" type="button" aria-label="打开菜单">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <span id="mobileThreadTitle" class="mobile-thread-title">Codex Remote</span>
        <div class="mobile-header-actions">
          <button id="mobileNewThreadBtn" class="ghost" type="button" aria-label="新建会话">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </header>

      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brandbar">
            <div class="brand-copy">
              <span class="eyebrow">Codex Remote</span>
              <h1>Remote Console</h1>
              <p>会话优先，工具按需展开。</p>
            </div>
            <button id="logoutBtn" class="ghost subtle" type="button">退出</button>
          </div>

          <section class="card compact sidebar-card connection-card">
            <div class="section-head">
              <div>
                <strong>连接状态</strong>
                <span>本地 daemon / app-server</span>
              </div>
              <button id="refreshHealthBtn" class="ghost">刷新</button>
            </div>
            <div id="healthPanel" class="health-grid"></div>
            <div id="statusBanner" class="status-banner muted">等待连接…</div>
          </section>

          <details class="card compact sidebar-card new-thread-card">
            <summary class="new-thread-summary">
              <div class="new-thread-summary-copy">
                <strong>新会话</strong>
                <span>按需展开创建</span>
              </div>
              <span class="new-thread-summary-action">展开</span>
            </summary>
            <div class="new-thread-body">
              <div class="form-grid">
                <label>
                  <span>模型</span>
                  <select id="newThreadModel">
                    <option value="gpt-5.4">gpt-5.4</option>
                    <option value="gpt-5.4-mini">gpt-5.4-mini</option>
                    <option value="gpt-5.3-codex">gpt-5.3-codex</option>
                    <option value="gpt-5.2">gpt-5.2</option>
                    <option value="gpt-5.2-codex">gpt-5.2-codex</option>
                    <option value="gpt-5.1-codex-max">gpt-5.1-codex-max</option>
                  </select>
                </label>
                <label class="span-two">
                  <span>工作目录</span>
                  <input id="newThreadCwd" type="text" placeholder="/Users/me/project" spellcheck="false" />
                </label>
                <label>
                  <span>审批</span>
                  <select id="newThreadApprovalPolicy">
                    <option value="untrusted">untrusted</option>
                    <option value="on-request">on-request</option>
                    <option value="on-failure">on-failure</option>
                    <option value="granular">granular</option>
                    <option value="never">never</option>
                  </select>
                </label>
                <label>
                  <span>沙箱</span>
                  <select id="newThreadSandboxType">
                    <option value="workspaceWrite">workspaceWrite</option>
                    <option value="readOnly">readOnly</option>
                    <option value="dangerFullAccess">dangerFullAccess</option>
                  </select>
                </label>
              </div>
              <div class="new-thread-actions">
                <button id="newThreadBtn" class="primary" type="button">新建会话</button>
              </div>
            </div>
          </details>
        </div>

        <section class="card compact sidebar-card thread-pane">
          <div class="section-head">
            <div>
              <strong>会话</strong>
              <span>最近更新优先</span>
            </div>
            <button id="refreshThreadsBtn" class="ghost">刷新</button>
          </div>
          <div id="threadList" class="thread-list"></div>
        </section>
      </aside>

      <main class="main">
        <header class="card compact main-header thread-summary-card">
          <div class="thread-header-copy">
            <span id="activeThreadTitle" class="thread-title-inline">未选择会话</span>
            <span id="activeThreadMeta" class="thread-meta-inline muted">先从左侧选一个会话，或新建一个。</span>
            <div id="activeThreadPath" class="path-pill muted">cwd: —</div>
          </div>
          <div class="row gap-wrap">
            <button id="resumeThreadBtn" class="ghost" disabled>恢复</button>
            <button id="reloadThreadBtn" class="ghost" disabled>重载</button>
            <button id="interruptTurnBtn" class="danger" disabled>中断</button>
          </div>
        </header>

        <section class="conversation-stage">
          <div id="conversationFeed" class="conversation-feed card"></div>

          <form id="composerForm" class="composer card compact">
            <textarea id="composerInput" rows="4" placeholder="给 Codex 发消息；如果当前 turn 还在运行，会自动走 steer。"></textarea>
            <div class="composer-row">
              <div class="muted" id="composerHint">主区只展示对话主线；审批、diff、事件放到底部工具栏。</div>
              <button id="sendMessageBtn" type="submit" class="primary" disabled>发送</button>
            </div>
          </form>
        </section>

        <section id="utilityTray" class="utility-tray card compact is-collapsed">
          <div class="utility-bar">
            <div class="utility-tabs">
              <button id="utilityTabApprovals" type="button" class="utility-tab active" data-utility-tab="approvals">
                审批
                <span id="approvalCount" class="badge">0</span>
              </button>
              <button id="utilityTabDiff" type="button" class="utility-tab" data-utility-tab="diff">
                Diff
                <span id="diffMeta" class="utility-pill">无</span>
              </button>
              <button id="utilityTabEvents" type="button" class="utility-tab" data-utility-tab="events">
                事件
              </button>
            </div>
            <div class="row">
              <button id="clearEventsBtn" class="ghost">清空事件</button>
              <button id="toggleUtilityBtn" type="button" class="ghost">展开工具栏</button>
            </div>
          </div>

          <div class="utility-content">
            <section id="utilityPanelApprovals" class="utility-panel is-active">
              <div id="approvalList" class="stack utility-stack"></div>
            </section>

            <section id="utilityPanelDiff" class="utility-panel">
              <pre id="diffPreview" class="code-block empty">暂无 diff</pre>
            </section>

            <section id="utilityPanelEvents" class="utility-panel">
              <div id="eventLog" class="event-log"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <template id="threadItemTemplate">
      <button class="thread-item">
        <div class="thread-item-title"></div>
        <div class="thread-item-preview"></div>
        <div class="thread-item-path"></div>
        <div class="thread-item-meta"></div>
      </button>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
